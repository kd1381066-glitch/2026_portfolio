                <h2 class="contact_form_title">Contact</h2>
                <p class="contact_form_text">
                    お問い合わせ内容を下記フォームへご記入ください。
                </p>
                <form action="https://formspree.io/f/xaqpbpje" method="POST" class="contact_form">
                    <div class="form_item">
                        <label for="name">お名前</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form_item">
                        <label for="name">企業名 (特にない場合はなしとご記入ください)</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form_item">
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form_item">
                        <label for="message">お問い合わせ内容</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <div class="form_btn">
                        <button type="submit">送信する</button>
                    </div>
                </form>
            </div>
        </section>
